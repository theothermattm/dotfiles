#Below configs from
# https://wiki.archlinux.org/index.php/Tmux#Vim_friendly_configuration
#Prefix is Ctrl-a
set -g prefix C-a
bind C-a send-prefix
unbind C-b

set -sg escape-time 1
set -g base-index 1
setw -g pane-base-index 1

#Mouse works as expected
setw -g mouse on

setw -g monitor-activity on
set -g visual-activity on

set -g mode-keys vi
set -g history-limit 10000

# y and p as in vim
bind Escape copy-mode
unbind p
bind p paste-buffer
bind -T copy-mode-vi 'v' send-keys begin-selection
bind -T copy-mode-vi 'y' send-keys copy-pipe "reattach-to-user-namespace pbcopy" 
bind -T copy-mode-vi 'Space' send-keys halfpage-down
bind -T copy-mode-vi 'Bspace' send-keys halfpage-up

# extra commands for interacting with the ICCCM clipboard
bind C-c run "tmux save-buffer - | xclip -i -sel clipboard"
bind C-v run "tmux set-buffer \"$(xclip -o -sel clipboard)\"; tmux paste-buffer"

# easy-to-remember split pane commands
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# moving between panes with vim movement keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# moving between windows with vim movement keys
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# resize panes with vim movement keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# FROM https://gist.github.com/wjduenow/9d0d8d234186af99b7cc4c49757db78c
# ==========================================
# 1. CORE SETTINGS & MOUSE
# ==========================================
set -g default-terminal "screen-256color"
set -g mouse on
set -g status-interval 1

# --- Scroll Fix (Smooth 1-line scrolling) ---
bind -T copy-mode-vi WheelUpPane select-pane \; send-keys -X cursor-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X cursor-down

# ==========================================
# 2. WINDOW NAMING (The Claude Survival Rules)
# ==========================================
# Prevents tmux and scripts from changing your manual tab names
set-option -g allow-rename off
set-window-option -g automatic-rename off

# ==========================================
# 3. ACTIVITY ALERTS (The Flash)
# ==========================================
setw -g monitor-activity on
set -g visual-activity off

# STYLE: The tab turns Red/Yellow when Claude (or a server) needs attention
set-window-option -g window-status-activity-style "fg=#f9e2af,bg=#f38ba8,bold"

# ==========================================
# 4. VISUAL STYLE (Rounded Pills)
# ==========================================
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-left "#[fg=#1e1e2e,bg=#a6e3a1,bold]  #S #[default] "
set -g status-right "#[fg=#94e2d5] %H:%M:%S "

# Space between the pills
set-window-option -g window-status-separator " "

# --- Inactive Window (Dark Grey Pill) ---
set-window-option -g window-status-format "#[fg=#313244,bg=#1e1e2e]#[fg=#cdd6f4,bg=#313244]#I:#W#[fg=#313244,bg=#1e1e2e]"

# --- Active Window (Bright Blue Pill) ---
set-window-option -g window-status-current-format "#[fg=#89b4fa,bg=#1e1e2e]#[fg=#11111b,bg=#89b4fa,bold]#I:#W#[fg=#89b4fa,bg=#1e1e2e]"

# ==========================================
# 5. PLUGINS (TPM)
# ==========================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (Keep at the bottom)
run '~/.tmux/plugins/tpm/tpm'
